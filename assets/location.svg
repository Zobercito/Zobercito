<svg width="350" height="60" viewBox="0 0 350 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="350" height="60" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  
  <!-- Partículas animadas de fondo -->
  <g opacity="0.3">
    <circle r="0.5" fill="white"><animate attributeName="cx" values="-50;400" dur="55s" begin="0s" repeatCount="indefinite" /><animate attributeName="cy" values="100;-20" dur="55s" begin="0s" repeatCount="indefinite" /></circle>
    <circle r="0.5" fill="white"><animate attributeName="cx" values="100;550" dur="55s" begin="-20s" repeatCount="indefinite" /><animate attributeName="cy" values="80;-40" dur="55s" begin="-20s" repeatCount="indefinite" /></circle>
    <circle r="0.5" fill="white"><animate attributeName="cx" values="-150;250" dur="55s" begin="-40s" repeatCount="indefinite" /><animate attributeName="cy" values="120;0" dur="55s" begin="-40s" repeatCount="indefinite" /></circle>
  </g>
  
  <g opacity="0.6">
    <circle r="1" fill="white"><animate attributeName="cx" values="-50;450" dur="35s" begin="-5s" repeatCount="indefinite" /><animate attributeName="cy" values="70;-50" dur="35s" begin="-5s" repeatCount="indefinite" /></circle>
    <circle r="1" fill="white"><animate attributeName="cx" values="150;600" dur="35s" begin="-25s" repeatCount="indefinite" /><animate attributeName="cy" values="40;-80" dur="35s" begin="-25s" repeatCount="indefinite" /></circle>
  </g>
  
  <g opacity="0.9">
    <circle r="1.5" fill="white"><animate attributeName="cx" values="-100;500" dur="22s" begin="-10s" repeatCount="indefinite" /><animate attributeName="cy" values="120;-40" dur="22s" begin="-10s" repeatCount="indefinite" /></circle>
  </g>

  <!-- Contenedor central corregido para evitar solapamiento en móviles -->
  <g transform="translate(175, 30)">
    <!-- Ajuste de centrado total aumentado a -118 para compensar el nuevo espacio -->
    <g transform="translate(-118, 0)"> 
      <text 
          x="0" 
          y="0"
          dominant-baseline="middle" 
          text-anchor="start" 
          font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Code', 'Source Code Pro', monospace" 
          font-size="14" 
          font-weight="bold" 
          fill="white">
        From Panama to the world
      </text>
      
      <!-- Bandera desplazada a 215px para dar margen de seguridad al texto en móviles -->
      <g transform="translate(215, -8.5)">
        <svg width="21" height="14" viewBox="0 0 30 20" fill="none">
          <rect width="30" height="20" fill="#F5F5F5"/>
          <path d="M30 0H0V20H30V0Z" fill="#F0F0F0"/>
          <path d="M15 10C15 10 15 14.9984 15 20H0V10H5.00021C9.78129 10 15 10 15 10Z" fill="#0052B4"/>
          <path d="M30 0V10H24.9998C19.6983 10 15 10 15 10C15 10 15 4.70752 15 0H30Z" fill="#D80027"/>
          <path d="M7.49924 2.20886L8.19205 4.34108H10.434L8.62025 5.65894L9.31301 7.79115L7.49924 6.47335L5.68547 7.79115L6.37822 5.65894L4.56445 4.34108H6.80643L7.49924 2.20886Z" fill="#0052B4"/>
          <path d="M22.4992 12.2089L23.1921 14.3411H25.434L23.6203 15.6589L24.313 17.7912L22.4992 16.4733L20.6855 17.7912L21.3782 15.6589L19.5645 14.3411H21.8064L22.4992 12.2089Z" fill="#D80027"/>
        </svg>
      </g>
    </g>
  </g>
</svg>